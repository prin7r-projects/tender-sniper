name: landing-build

on:
  pull_request:
    paths:
      - "apps/landing/**"
      - "Dockerfile.landing"
      - ".github/workflows/landing-build.yml"
  push:
    branches: [main]
    paths:
      - "apps/landing/**"
      - "Dockerfile.landing"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/landing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/landing/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
