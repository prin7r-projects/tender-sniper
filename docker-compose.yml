services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile.landing
    image: brassmark-landing:latest
    container_name: brassmark-landing
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tender-sniper.rule=Host(`tender-sniper.prin7r.com`)"
      - "traefik.http.routers.tender-sniper.entrypoints=websecure"
      - "traefik.http.routers.tender-sniper.tls.certresolver=letsencrypt"
      - "traefik.http.services.tender-sniper.loadbalancer.server.port=3000"
